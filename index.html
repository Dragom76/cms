<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 게시물 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script src="gnb.js"></script>
    <script src="footer.js"></script>
    <style>
        /* 첫 화면에서 폼을 숨기거나 유연하게 보여주기 위한 레이아웃 스타일 추가 */
        .erp-container {
            display: block; /* 기본은 한 줄 전체 차지 */
            transition: all 0.3s ease;
        }
        /* 폼이 열렸을 때만 2단 분할 레이아웃으로 변경 */
        .erp-container.split-mode {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
        }
        #form-card {
            display: none; /* 첫 화면에서는 무조건 숨김 */
        }
        #form-card.show {
            display: block; /* 활성화 시에만 노출 */
        }
        .list-header-actions {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="erp-container" id="main-container">
        <!-- 왼쪽: 리스트 섹션 (첫 화면에는 전체 화면으로 꽉 차게 보임) -->
        <div class="erp-card">
            <div class="card-title">
                <span>게시물 마스터 리스트</span>
                <div class="list-header-actions">
                    <button class="btn btn-primary" onclick="openWriteMode()">➕ 신규 게시물 등록</button>
                    <button class="btn btn-excel" onclick="downloadExcel()">📊 엑셀 다운로드</button>
                </div>
            </div>
            <table class="erp-table">
                <thead>
                    <tr>
                        <th>순번</th>
                        <th>제목</th>
                        <th>작성일</th>
                    </tr>
                </thead>
                <tbody id="post-list">
                    <!-- 데이터 동적 삽입 -->
                </tbody>
            </table>
        </div>

        <!-- 오른쪽: 글쓰기/읽기/수정 통합 폼 섹션 (기본 숨김) -->
        <div class="erp-card" id="form-card">
            <div class="card-title">
                <span id="form-title">신규 게시물 등록</span>
                <button class="btn btn-secondary" onclick="closeForm()">창 닫기 ✖</button>
            </div>
            <form id="post-form" onsubmit="handleSubmit(event)">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <textarea id="content" class="form-control" rows="6"></textarea>
                </div>
                <div class="form-group" id="file-group">
                    <label>이미지 첨부 (모바일의 경우 카메라 촬영 가능)</label>
                    <input type="file" id="image" class="form-control" accept="image/*" capture="environment" onchange="previewImage(event)">
                    <img id="preview" class="img-preview">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" id="btn-delete" class="btn btn-danger" style="display: none;" onclick="deletePost()">삭제</button>
                    <button type="submit" id="btn-submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allPosts = [];

        // 페이지 로드 시 초기 리스트 조회
        async function fetchPosts() {
            try {
                const res = await fetch('/api/posts');
                allPosts = await res.json();
                const tbody = document.getElementById('post-list');
                
                if (allPosts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px; color:#64748b;">데이터가 없습니다.</td></tr>';
                    return;
                }

                tbody.innerHTML = allPosts.map(post => `
                    <tr onclick="loadPost(${post.id})">
                        <td>${post.id}</td>
                        <td>${post.title}</td>
                        <td>${new Date(post.created_at).toLocaleDateString()}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("데이터 로드 오류:", err);
            }
        }

        // [추가] 글쓰기 버튼 클릭 시 우측에 폼 열기
        function openWriteMode() {
            resetForm();
            document.getElementById('main-container').classList.add('split-mode');
            document.getElementById('form-card').classList.add('show');
        }

        // [추가] 창 닫기 버튼 클릭 시 폼 숨기고 리스트 전체 화면화
        function closeForm() {
            document.getElementById('main-container').classList.remove('split-mode');
            document.getElementById('form-card').classList.remove('show');
        }

        // 특정 항목 클릭 시 폼에 데이터 로드 및 우측 창 열기 (읽기/수정 모드)
        function loadPost(id) {
            const post = allPosts.find(p => p.id === id);
            if (!post) return;

            // 레이아웃 열기
            document.getElementById('main-container').classList.add('split-mode');
            document.getElementById('form-card').classList.add('show');

            // 데이터 세팅
            document.getElementById('post-id').value = post.id;
            document.getElementById('title').value = post.title;
            document.getElementById('content').value = post.content;
            document.getElementById('form-title').innerText = `게시물 상세 및 수정 (No. ${post.id})`;
            document.getElementById('btn-delete').style.display = 'block';

            const preview = document.getElementById('preview');
            if (post.image_url) {
                preview.src = post.image_url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        // 신규 작성 모드로 폼 내부 초기화
        function resetForm() {
            document.getElementById('post-id').value = '';
            document.getElementById('post-form').reset();
            document.getElementById('form-title').innerText = '신규 게시물 등록';
            document.getElementById('btn-delete').style.display = 'none';
            document.getElementById('preview').style.display = 'none';
        }

        // 파일 업로드 시 이미지 미리보기
        function previewImage(event) {
            const preview = document.getElementById('preview');
            const files = event.target.files;
            if (files && files.length > 0) {
                preview.src = URL.createObjectURL(files[0]);
                preview.style.display = 'block';
            }
        }

        // 등록 및 수정 서밋 처리
        async function handleSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('post-id').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (id) {
                // 수정 (PUT)
                await fetch(`/api/posts/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
            } else {
                // 신규 등록 (POST)
                const formData = new FormData();
                formData.append('title', title);
                formData.append('content', content);
                
                const fileInput = document.getElementById('image');
                if (fileInput.files && fileInput.files.length > 0) {
                    formData.append('image', fileInput.files[0]);
                }

                await fetch('/api/posts', {
                    method: 'POST',
                    body: formData
                });
            }
            closeForm(); // 저장 후 창 닫기
            fetchPosts();
        }

        // 데이터 삭제 (DELETE)
        async function deletePost() {
            const id = document.getElementById('post-id').value;
            if (id && confirm('정말 이 게시물을 삭제하시겠습니까?')) {
                await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                closeForm(); // 삭제 후 창 닫기
                fetchPosts();
            }
        }

        // 엑셀 파일 다운로드 요청
        function downloadExcel() {
            window.location.href = '/api/posts/excel';
        }

        window.onload = fetchPosts;
    </script>
</body>
</html>
